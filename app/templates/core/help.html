{% extends "base.html" %}
{% block title %}{{ title }} · Biggy{% endblock %}
{% block content %}
<div class="toolbar">
  <h1 style="margin:0">Help</h1>
  <span style="flex:1"></span>
  <a class="btn{{ ' primary' if topic == 'user' }}" href="{{ url_for('core.help_page', topic='user') }}">User manual</a>
  {% if current_user.is_designer %}
    <a class="btn{{ ' primary' if topic == 'designer' }}" href="{{ url_for('core.help_page', topic='designer') }}">Designer manual</a>
    <a class="btn{{ ' primary' if topic == 'setup' }}" href="{{ url_for('core.help_page', topic='setup') }}">Setup &amp; ops</a>
    <a class="btn{{ ' primary' if topic == 'developer' }}" href="{{ url_for('core.help_page', topic='developer') }}">Developer</a>
    <a class="btn{{ ' primary' if topic == 'schema' }}" href="{{ url_for('core.help_page', topic='schema') }}">Schema JSON</a>
  {% endif %}
</div>

<div class="panel markdown" style="max-width:820px">
  {{ content|safe }}
</div>
{% endblock %}
